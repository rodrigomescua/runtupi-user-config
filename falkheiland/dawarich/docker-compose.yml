services:
  dawarich:
    # Ensure the image is not pulled if present
    pull_policy: missing
    labels:
      # Websecure
      # Use the chain-Domain-auth middleware for domain handling
      traefik.http.routers.dawarich-falkheiland.middlewares: chain-Domain-auth@file
      traefik.http.routers.dawarich-falkheiland.tls.certresolver: ''
      # WebSecure local IP
      # Use additional router for local access
      traefik.http.routers.dawarich-falkheiland-privip.rule: Host(`${APP_DOMAIN}`) && ClientIP(`${PRIVATE_IPV4}`)
      traefik.http.routers.dawarich-falkheiland-privip.middlewares: chain-Domain@file
      traefik.http.routers.dawarich-falkheiland-privip.entrypoints: websecure
      traefik.http.routers.dawarich-falkheiland-privip.service: dawarich-falkheiland
      traefik.http.routers.dawarich-falkheiland-privip.priority: 100
      traefik.http.routers.dawarich-falkheiland-privip.tls.certresolver: ''
