services:
  webserver:
    environment:
      - POZNOTE_OIDC_CLIENT_ID=${POZNOTE_OIDC_CLIENT_ID}
      - POZNOTE_OIDC_CLIENT_SECRET=${POZNOTE_OIDC_CLIENT_SECRET}
      - POZNOTE_OIDC_DISABLE_NORMAL_LOGIN=${POZNOTE_OIDC_DISABLE_NORMAL_LOGIN}
    labels:
      # Websecure
      # Use the chain-public-auth middleware for domain handling
      traefik.http.routers.poznote-rodrigomescua.middlewares: chain-public-auth@file
      # Use the default certresolver
      traefik.http.routers.poznote-rodrigomescua.tls.certresolver: ''
      # WebSecure local IP
      # Use additional router for local access
      traefik.http.routers.poznote-rodrigomescua-privip.rule: Host(`${APP_DOMAIN}`) && ClientIP(`${PRIVATE_IPV4}`)
      traefik.http.routers.poznote-rodrigomescua-privip.middlewares: chain-public@file
      traefik.http.routers.poznote-rodrigomescua-privip.entrypoints: websecure
      traefik.http.routers.poznote-rodrigomescua-privip.service: poznote-rodrigomescua
      traefik.http.routers.poznote-rodrigomescua-privip.priority: 100
      traefik.http.routers.poznote-rodrigomescua-privip.tls.certresolver: ''

  mcp-server:
    labels:
      # Websecure
      # MCP is machine-to-machine — skip forward auth, use geoblock+headers only
      traefik.http.routers.poznote-rodrigomescua-mcp.middlewares: chain-public@file
      # Use the default certresolver
      traefik.http.routers.poznote-rodrigomescua-mcp.tls.certresolver: ''
      # WebSecure local IP
      # Use additional router for local access
      traefik.http.routers.poznote-rodrigomescua-mcp-privip.rule: Host(`${APP_DOMAIN}`) && ClientIP(`${PRIVATE_IPV4}`)
      traefik.http.routers.poznote-rodrigomescua-mcp-privip.middlewares: chain-public@file
      traefik.http.routers.poznote-rodrigomescua-mcp-privip.entrypoints: websecure
      traefik.http.routers.poznote-rodrigomescua-mcp-privip.service: poznote-rodrigomescua-mcp
      traefik.http.routers.poznote-rodrigomescua-mcp-privip.priority: 100
      traefik.http.routers.poznote-rodrigomescua-mcp-privip.tls.certresolver: ''

