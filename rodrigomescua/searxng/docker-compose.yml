services:
  searxng:
    labels:
      # Websecure
      # Use the chain-public-auth middleware for domain handling
      traefik.http.routers.searxng-rodrigomescua.middlewares: chain-public-auth@file
      traefik.http.routers.searxng-rodrigomescua.tls.certresolver: ''
      # WebSecure local IP
      # Use additional router for local access
      traefik.http.routers.searxng-rodrigomescua-privip.rule: Host(`${APP_DOMAIN}`) && ClientIP(`${PRIVATE_IPV4}`)
      traefik.http.routers.searxng-rodrigomescua-privip.middlewares: chain-public@file
      traefik.http.routers.searxng-rodrigomescua-privip.entrypoints: websecure
      traefik.http.routers.searxng-rodrigomescua-privip.service: searxng-rodrigomescua
      traefik.http.routers.searxng-rodrigomescua-privip.priority: 100
      traefik.http.routers.searxng-rodrigomescua-privip.tls.certresolver: ''


