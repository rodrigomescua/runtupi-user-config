services:
  linkwarden:
    labels:
      # Websecure
      # Use the chain-Domain-auth middleware for domain handling
      traefik.http.routers.linkwarden-rodrigomescua.middlewares: chain-Domain-auth@file
      # Use the default certresolver
      traefik.http.routers.linkwarden-rodrigomescua.tls.certresolver: ''

  linkwarden-db:
    networks:
      # This network is shared with the docker-db-backup app
      shared_docker-db-backup_network:
        gw_priority: 0
    labels:
      cupdate.config.stay-on-current-major: true

networks:
  # This network is shared with the docker-db-backup app
  shared_docker-db-backup_network:
    external: true

