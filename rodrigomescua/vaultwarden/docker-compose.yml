services:
  vaultwarden:
    labels:
      # Websecure
      # Use the chain-Domain-auth middleware for domain handling
      traefik.http.routers.vaultwarden-rodrigomescua.middlewares: chain-Domain-auth@file
      # Use the default certresolver
      traefik.http.routers.vaultwarden-rodrigomescua.tls.certresolver: ''
      # WebSecure local IP
      # Use additional router for local access
      traefik.http.routers.vaultwarden-rodrigomescua-privip.rule: Host(`${APP_DOMAIN}`) && ClientIP(`${PRIVATE_IPV4}`)
      traefik.http.routers.vaultwarden-rodrigomescua-privip.middlewares: chain-Domain@file
      traefik.http.routers.vaultwarden-rodrigomescua-privip.entrypoints: websecure
      traefik.http.routers.vaultwarden-rodrigomescua-privip.service: vaultwarden-rodrigomescua
      traefik.http.routers.vaultwarden-rodrigomescua-privip.priority: 100
      traefik.http.routers.vaultwarden-rodrigomescua-privip.tls.certresolver: ''

