services:
  gharmonize:
    labels:
      # Websecure
      # Use the chain-Domain-auth middleware for domain handling
      traefik.http.routers.gharmonize-rodrigomescua.middlewares: chain-Domain-auth@file
      # Use the default certresolver
      traefik.http.routers.gharmonize-rodrigomescua.tls.certresolver: ''
      # WebSecure local IP
      # Use additional router for local access
      traefik.http.routers.gharmonize-rodrigomescua-privip.rule: Host(`${APP_DOMAIN}`) && ClientIP(`${PRIVATE_IPV4}`)
      traefik.http.routers.gharmonize-rodrigomescua-privip.middlewares: chain-Domain@file
      traefik.http.routers.gharmonize-rodrigomescua-privip.entrypoints: websecure
      traefik.http.routers.gharmonize-rodrigomescua-privip.service: gharmonize-rodrigomescua
      traefik.http.routers.gharmonize-rodrigomescua-privip.priority: 100
      traefik.http.routers.gharmonize-rodrigomescua-privip.tls.certresolver: ''

